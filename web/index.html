<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<title>Router Auditor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ========================================================
   Router Auditor — Light theme, oklch colors, Geist fonts
   ======================================================== */
:root {
  --bg:        oklch(0.985 0.004 80);
  --bg-2:      oklch(0.97 0.005 80);
  --bg-3:      oklch(0.955 0.005 80);
  --panel:     oklch(1 0 0);
  --border:    oklch(0.91 0.005 80);
  --border-2:  oklch(0.94 0.004 80);
  --hover:     oklch(0.96 0.006 80);
  --ink:       oklch(0.18 0.012 270);
  --ink-2:     oklch(0.36 0.010 270);
  --ink-3:     oklch(0.55 0.008 270);
  --ink-4:     oklch(0.72 0.005 270);
  --ink-5:     oklch(0.86 0.004 270);
  --accent:    oklch(0.55 0.22 268);
  --accent-2:  oklch(0.68 0.20 268);
  --accent-bg: oklch(0.55 0.22 268 / 0.10);
  --pass:      oklch(0.62 0.16 152);
  --pass-bg:   oklch(0.62 0.16 152 / 0.10);
  --warn:      oklch(0.72 0.15 75);
  --warn-bg:   oklch(0.72 0.15 75 / 0.14);
  --fail:      oklch(0.60 0.20 27);
  --fail-bg:   oklch(0.60 0.20 27 / 0.10);
  --suspicious: oklch(0.60 0.18 300);
  --suspicious-bg: oklch(0.60 0.18 300 / 0.10);
  --dark:      oklch(0.12 0.014 270);
  --dark-2:    oklch(0.17 0.014 270);
  --ff-text: 'Geist', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --ff-disp: 'Plus Jakarta Sans', 'Geist', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --ff-mono: 'Geist Mono', ui-monospace, 'SF Mono', 'Cascadia Code', monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--ff-text);
  color: var(--ink);
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 50% at 20% 80%, oklch(0.55 0.22 268 / 0.04), transparent 50%),
    radial-gradient(ellipse 60% 60% at 80% 20%, oklch(0.65 0.20 320 / 0.03), transparent 50%),
    radial-gradient(ellipse 50% 40% at 50% 50%, oklch(0.78 0.18 200 / 0.025), transparent 50%);
  font-size: 14px;
  line-height: 1.5;
  letter-spacing: -0.011em;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: 'ss01';
  font-variant-numeric: tabular-nums;
  min-height: 100vh;
  position: relative;
}
body::after {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: radial-gradient(circle, oklch(0.18 0.012 270 / 0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}
button { font: inherit; color: inherit; cursor: pointer; background: none; border: 0; padding: 0; }
input, select, textarea { font: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }

/* App shell */
.app-shell { display: flex; flex-direction: column; min-height: 100vh; position: relative; z-index: 1; }
.app-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px;
  border-bottom: 1px solid var(--border);
  background: oklch(1 0 0 / 0.7);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 30;
  background-image: linear-gradient(to right, oklch(0.55 0.22 268 / 0.08), oklch(0.65 0.20 320 / 0.06), oklch(0.78 0.18 200 / 0.04));
  background-size: 100% 2px;
  background-position: bottom;
  background-repeat: no-repeat;
}
.brand-mark { display: inline-flex; align-items: center; gap: 10px; font-family: var(--ff-mono); font-size: 13px; font-weight: 500; color: var(--ink); cursor: pointer; }
.brand-mark .glyph { width: 26px; height: 26px; border-radius: 7px;
  background: linear-gradient(135deg, oklch(0.55 0.22 268), oklch(0.65 0.20 320));
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: oklch(1 0 0 / 1);
  box-shadow: 0 4px 16px oklch(0.55 0.22 268 / 0.25);
  overflow: hidden;
}
.brand-mark .glyph svg { width: 18px; height: 18px; }
.brand-mark .ver { color: var(--ink-4); margin-left: 2px; }
.nav-tabs { display: flex; gap: 4px; padding: 4px; background: var(--bg-2); border-radius: 100px; border: 1px solid var(--border); }
.nav-tab {
  padding: 7px 16px; border-radius: 100px; font-size: 13px; font-weight: 500;
  color: var(--ink-2); letter-spacing: -0.005em;
  display: inline-flex; align-items: center; gap: 6px; transition: all .12s;
}
.nav-tab:hover { color: var(--ink); }
.nav-tab.on {
  background: var(--panel); color: var(--ink);
  box-shadow: 0 1px 3px oklch(0.18 0.012 270 / 0.10), 0 2px 6px oklch(0.18 0.012 270 / 0.06), 0 0 0 1px oklch(0.18 0.012 270 / 0.04);
}
.nav-tab .ct {
  font-family: var(--ff-mono); font-size: 10.5px;
  background: var(--ink); color: oklch(1 0 0 / 0.95);
  padding: 1px 6px; border-radius: 100px; font-weight: 600;
}
.nav-tab.on .ct { background: var(--accent); }
.nav-right { display: flex; align-items: center; gap: 12px; font-family: var(--ff-mono); font-size: 12px; color: var(--ink-3); }
.nav-right .meta-pill {
  display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px;
  border: 1px solid var(--border); border-radius: 100px; background: var(--panel);
}
.nav-right .meta-pill .d { width: 5px; height: 5px; border-radius: 50%; background: var(--pass); box-shadow: 0 0 0 2px oklch(0.62 0.16 152 / 0.2); }
.app-page { flex: 1; }

/* Pulse animation */
@keyframes livepulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--pass); box-shadow: 0 0 0 2px oklch(0.62 0.16 152 / 0.2); animation: livepulse 2s ease-in-out infinite; display: inline-block; }

/* ===== SETUP PAGE ===== */
.home { position: relative; overflow: hidden; padding: 32px 28px 80px; }
.home::before {
  content: ''; position: absolute; inset: -10% -5% auto -5%; height: 70%;
  background:
    radial-gradient(ellipse 50% 60% at 25% 30%, oklch(0.55 0.22 268 / 0.13), transparent 60%),
    radial-gradient(ellipse 40% 50% at 75% 40%, oklch(0.65 0.20 320 / 0.10), transparent 60%),
    radial-gradient(ellipse 30% 40% at 50% 70%, oklch(0.78 0.18 200 / 0.07), transparent 60%);
  filter: blur(60px); pointer-events: none; z-index: 0;
}
.home > * { position: relative; z-index: 1; }
.home-hero { max-width: 920px; margin: 28px auto 28px; text-align: center; }
.home-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 12px 5px 6px; background: oklch(1 0 0 / 0.7);
  border: 1px solid var(--border); border-radius: 100px;
  font-family: var(--ff-mono); font-size: 11.5px; font-weight: 500; color: var(--ink-2);
  margin-bottom: 24px; backdrop-filter: blur(8px);
}
.home-eyebrow .badge { background: var(--ink); color: oklch(1 0 0 / 0.96); padding: 2px 8px; border-radius: 100px; font-size: 10.5px; }
.home-title {
  font-family: var(--ff-disp); font-size: clamp(38px, 5.4vw, 76px); font-weight: 700;
  letter-spacing: -0.05em; line-height: 0.98; margin: 0 0 18px; color: var(--ink);
}
.home-title em {
  font-style: normal; font-weight: 600;
  background: linear-gradient(135deg, var(--accent), oklch(0.68 0.20 320), oklch(0.78 0.18 200));
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
.home-sub { font-size: 17px; color: var(--ink-3); letter-spacing: -0.011em; max-width: 600px; margin: 0 auto 0; line-height: 1.5; }

/* Form card */
.form-card {
  width: 100%; max-width: 820px; margin: 36px auto 0;
  background: var(--panel); border: 1px solid var(--border); border-radius: 28px;
  box-shadow: 0 1px 0 oklch(1 0 0 / 0.6) inset, 0 40px 100px -30px oklch(0.18 0.012 270 / 0.20), 0 14px 40px -14px oklch(0.18 0.012 270 / 0.12);
  overflow: hidden;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.form-card:hover {
  box-shadow: 0 1px 0 oklch(1 0 0 / 0.6) inset, 0 0 0 1px oklch(1 0 0 / 0.4) inset, 0 40px 100px -30px oklch(0.18 0.012 270 / 0.24), 0 14px 40px -14px oklch(0.18 0.012 270 / 0.16);
}
.form-card-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 22px; border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, var(--bg-2), var(--panel));
}
.form-card-head .l { display: flex; align-items: center; gap: 10px; font-family: var(--ff-mono); font-size: 11.5px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }
.form-card-head .l .step {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--ink); color: oklch(1 0 0 / 0.96);
  font-size: 10px; font-weight: 600; letter-spacing: 0; text-transform: none;
}
.form-card-head .r { font-family: var(--ff-mono); font-size: 11.5px; color: var(--ink-4); }
.form-body { padding: 24px 26px; }

/* Field styles */
.field-block { margin-bottom: 18px; }
.field-label { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 8px; }
.field-label .l { font-size: 13px; font-weight: 500; color: var(--ink); flex-shrink: 0; }
.field-label .h { font-family: var(--ff-mono); font-size: 11px; color: var(--ink-4); text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.input {
  display: flex; align-items: stretch;
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: 14px; height: 54px; overflow: hidden;
  transition: border-color .2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow .2s cubic-bezier(0.4, 0, 0.2, 1), background .2s;
}
.input:focus-within { border-color: var(--accent); background: var(--panel); box-shadow: 0 0 0 4px oklch(0.55 0.22 268 / 0.14), 0 0 0 1px oklch(0.55 0.22 268 / 0.30); }
.input .pre { display: flex; align-items: center; padding: 0 14px; border-right: 1px solid var(--border); font-family: var(--ff-mono); font-size: 14px; color: var(--ink-2); font-weight: 500; white-space: nowrap; }
.input .pre select { background: transparent; border: 0; outline: none; font-family: var(--ff-mono); font-size: 14px; color: var(--ink-2); font-weight: 500; cursor: pointer; padding-right: 14px; }
.input input, .input select { flex: 1; min-width: 0; padding: 0 16px; background: transparent; border: 0; outline: none; font-size: 15.5px; color: var(--ink); }
.input input.mono { font-family: var(--ff-mono); font-size: 14.5px; }
.input input::placeholder { color: var(--ink-4); }
.input .post { display: flex; align-items: center; gap: 6px; padding: 0 14px; border-left: 1px solid var(--border); font-family: var(--ff-mono); font-size: 11.5px; color: var(--ink-3); font-weight: 500; white-space: nowrap; }
.input .post .d { width: 6px; height: 6px; border-radius: 50%; background: var(--pass); box-shadow: 0 0 0 2px oklch(0.62 0.16 152 / 0.2); }
.input .post.bad .d { background: var(--fail); box-shadow: 0 0 0 2px var(--fail-bg); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* Mode selector */
.mode-seg { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.mode-card {
  background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
  padding: 14px 14px 12px; text-align: left; transition: all .15s; position: relative;
}
.mode-card:hover { border-color: var(--ink-4); }
.mode-card.on { border-color: var(--ink); background: var(--ink); color: oklch(1 0 0 / 0.96); box-shadow: 0 6px 24px oklch(0.18 0.012 270 / 0.18); }
.mode-card .mn { font-size: 13.5px; font-weight: 600; margin-bottom: 2px; }
.mode-card .md { font-family: var(--ff-mono); font-size: 11px; color: var(--ink-3); }
.mode-card.on .md { color: oklch(1 0 0 / 0.65); }
.mode-card .mt { position: absolute; top: 12px; right: 12px; font-family: var(--ff-mono); font-size: 10.5px; color: var(--ink-4); }
.mode-card.on .mt { color: oklch(0.85 0.18 268); }

/* Capability chips */
.caps-row { display: flex; gap: 6px; flex-wrap: wrap; }
.cap-chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 100px; font-size: 12.5px; font-weight: 500; color: var(--ink-2); border: 1px solid var(--border); background: var(--panel); transition: all .15s; cursor: pointer; user-select: none; }
.cap-chip:hover { border-color: var(--ink-4); color: var(--ink); }
.cap-chip.on { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
.cap-chip .ck { width: 14px; height: 14px; border-radius: 4px; border: 1.5px solid var(--ink-4); display: flex; align-items: center; justify-content: center; font-size: 10px; transition: all .12s; }
.cap-chip.on .ck { background: var(--accent); border-color: var(--accent); color: white; }

/* Advanced toggle */
.adv-toggle { display: flex; align-items: center; gap: 8px; padding: 10px 0; font-size: 13px; font-weight: 500; color: var(--ink-3); cursor: pointer; transition: color .12s; margin-top: 8px; }
.adv-toggle:hover { color: var(--ink); }
.adv-toggle .arrow { transition: transform .2s; font-size: 11px; }
.adv-toggle.open .arrow { transform: rotate(90deg); }
.adv-body { display: none; padding: 12px 0; }
.adv-body.open { display: block; }
.adv-section { padding: 12px 16px; border-radius: 12px; background: var(--bg-2); border: 1px solid var(--border); margin-bottom: 12px; }
.adv-section .adv-title { font-size: 12px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
.adv-section .adv-desc { font-size: 11.5px; color: var(--ink-3); line-height: 1.5; margin-bottom: 10px; }

/* Form footer */
.form-foot { margin-top: 24px; display: flex; justify-content: space-between; align-items: center; gap: 16px; }
.btn-primary {
  display: inline-flex; align-items: center; gap: 12px;
  padding: 0 8px 0 24px; height: 54px;
  background: linear-gradient(135deg, oklch(0.18 0.012 270), oklch(0.22 0.04 268), oklch(0.20 0.03 300));
  color: oklch(1 0 0 / 0.96);
  border-radius: 100px; font-size: 15px; font-weight: 500;
  transition: transform .1s, box-shadow .25s, background .25s;
  box-shadow: 0 8px 28px oklch(0.18 0.012 270 / 0.22);
  position: relative; overflow: hidden;
}
.btn-primary::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent 30%, oklch(0.55 0.22 268 / 0.15) 50%, transparent 70%); opacity: 0; transition: opacity .3s; }
.btn-primary:hover { box-shadow: 0 12px 36px oklch(0.55 0.22 268 / 0.25), 0 4px 16px oklch(0.65 0.20 320 / 0.15); }
.btn-primary:hover::before { opacity: 1; }
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { background: var(--ink-5); box-shadow: none; cursor: not-allowed; }
.btn-primary .arrow { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, oklch(0.55 0.22 268), oklch(0.65 0.20 320)); display: flex; align-items: center; justify-content: center; font-size: 17px; color: oklch(1 0 0 / 1); }
.btn-primary:disabled .arrow { background: oklch(0.85 0.004 270); }
.foot-hint { font-family: var(--ff-mono); font-size: 11.5px; color: var(--ink-3); }
.foot-hint .kbd { display: inline-flex; padding: 2px 7px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 5px; font-family: var(--ff-mono); font-size: 10.5px; color: var(--ink-2); margin: 0 2px; }

/* Model chips */
.model-grid { display: flex; flex-wrap: wrap; gap: 6px; max-height: 200px; overflow-y: auto; padding: 4px 0; }
.model-chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 8px; font-family: var(--ff-mono); font-size: 12px; color: var(--ink-2); border: 1px solid var(--border); background: var(--panel); cursor: pointer; transition: all .12s; }
.model-chip:hover { border-color: var(--ink-4); color: var(--ink); }
.model-chip.on { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }

/* Buttons */
.btn-ghost { display: inline-flex; align-items: center; gap: 8px; padding: 9px 16px; background: var(--panel); border: 1px solid var(--border); border-radius: 100px; font-size: 13px; font-weight: 500; color: var(--ink-2); transition: all .12s; }
.btn-ghost:hover { border-color: var(--ink-4); color: var(--ink); }
.btn-dark { display: inline-flex; align-items: center; gap: 8px; padding: 9px 18px; background: var(--ink); color: oklch(1 0 0 / 0.96); border-radius: 100px; font-size: 13px; font-weight: 500; transition: transform .1s; }
.btn-dark:hover { transform: translateY(-1px); }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* ===== RUNNING PAGE ===== */
.running-pg { padding: 28px 28px 80px; }
.run-header {
  max-width: 1280px; margin: 0 auto 18px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.run-header .left { display: flex; align-items: center; gap: 12px; font-family: var(--ff-mono); font-size: 12.5px; color: var(--ink-3); }
.run-header .left b { color: var(--ink); font-weight: 500; }
.run-header .left .lab { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: var(--accent-bg); color: var(--accent); border-radius: 100px; font-weight: 500; }
.cancel-btn { display: inline-flex; align-items: center; gap: 8px; padding: 9px 16px; background: var(--panel); border: 1px solid var(--border); border-radius: 100px; font-size: 13px; font-weight: 500; color: var(--ink-2); transition: all .15s; }
.cancel-btn:hover { border-color: var(--fail); color: var(--fail); background: var(--fail-bg); }
.run-grid { max-width: 1280px; margin: 0 auto; display: grid; grid-template-columns: 1fr 360px; gap: 16px; align-items: start; }

/* Summary card */
.run-summary-card {
  background: var(--panel); border: 1px solid var(--border); border-radius: 24px;
  padding: 26px 28px; position: relative; overflow: hidden;
  box-shadow: 0 1px 0 oklch(1 0 0 / 0.6) inset, 0 12px 32px -12px oklch(0.18 0.012 270 / 0.10);
  margin-bottom: 14px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.run-summary-card::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 40% 100% at 100% 50%, var(--accent-bg), transparent 60%); pointer-events: none; }
.run-summary-card > * { position: relative; }
.rs-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.rs-eyebrow { display: inline-flex; align-items: center; gap: 8px; font-family: var(--ff-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); font-weight: 600; }
@keyframes pulsering { 0%, 100% { box-shadow: 0 0 0 3px oklch(0.55 0.22 268 / 0.20); } 50% { box-shadow: 0 0 0 8px oklch(0.55 0.22 268 / 0.05); } }
.rs-eta { font-family: var(--ff-mono); font-size: 11.5px; color: var(--ink-3); }
.rs-eta b { color: var(--ink); font-weight: 500; }
.rs-body { display: grid; grid-template-columns: auto 1fr auto; gap: 32px; align-items: center; }

/* Progress ring */
.run-ring-wrap { position: relative; width: 140px; height: 140px; }
.run-ring { width: 100%; height: 100%; transform: rotate(-90deg); }
.run-ring .track { fill: none; stroke: var(--border-2); stroke-width: 7; }
.run-ring .bar { fill: none; stroke: url(#runGrad); stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset .35s cubic-bezier(.4,0,.2,1); filter: drop-shadow(0 0 8px oklch(0.55 0.22 268 / 0.4)); }
.run-ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.run-pct { font-family: var(--ff-disp); font-size: 44px; font-weight: 300; letter-spacing: -0.04em; color: var(--ink); line-height: 1; }
.run-pct sup { font-size: 16px; color: var(--ink-3); margin-left: 2px; }
.run-ring-center .lab { margin-top: 6px; font-family: var(--ff-mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.08em; }

.rs-current .lab { font-family: var(--ff-mono); font-size: 11px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.rs-current .ttl { font-family: var(--ff-disp); font-size: 22px; font-weight: 500; letter-spacing: -0.025em; color: var(--ink); line-height: 1.2; }
.rs-current .ds { margin-top: 4px; font-size: 13px; color: var(--ink-3); }
.rs-tally { display: grid; grid-template-columns: repeat(3, auto); gap: 20px; text-align: right; }
.rs-tally .item .n { font-family: var(--ff-disp); font-size: 28px; font-weight: 400; letter-spacing: -0.030em; line-height: 1; color: var(--ink); }
.rs-tally .item.pass .n { color: var(--pass); }
.rs-tally .item.warn .n { color: var(--warn); }

/* Matrix */
.matrix-card { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 18px 20px; margin-bottom: 14px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

.matrix-head .legend .pl { display: inline-flex; align-items: center; gap: 6px; }

.matrix-head .legend .pl .d.pending { background: var(--bg-3); border: 1px solid var(--border); }
.matrix-head .legend .pl .d.run { background: var(--accent); }
.matrix-head .legend .pl .d.pass { background: var(--pass); }
.matrix-head .legend .pl .d.warn { background: var(--warn); }
.matrix-head .legend .pl .d.fail { background: var(--fail); }
.matrix { display: grid; grid-template-columns: repeat(17, 1fr); gap: 5px; }
.mx-cell { aspect-ratio: 1; min-width: 11px; min-height: 11px; border-radius: 3px; background: var(--bg-3); border: 1px solid var(--border); transition: background .25s, transform .15s ease-out, box-shadow .25s, border-color .15s; cursor: default; position: relative; }

.mx-cell.run { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 14px oklch(0.55 0.22 268 / 0.55), 0 0 4px oklch(0.55 0.22 268 / 0.30); animation: cell-pulse 0.9s ease-in-out infinite; }
.mx-cell.pass { background: var(--pass); border-color: var(--pass); }
.mx-cell.warn, .mx-cell.suspicious, .mx-cell.inconclusive { background: var(--warn); border-color: var(--warn); }
.mx-cell.fail { background: var(--fail); border-color: var(--fail); }
.mx-cell.skip { background: var(--ink-5); border-color: var(--ink-5); }
@keyframes cell-pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(0.78); opacity: 0.7; } }

/* Detector list */
.list-card { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
.list-card .lc-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); background: var(--bg-2); font-family: var(--ff-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-3); font-weight: 500; }
.list-card .lc-body { max-height: 540px; overflow-y: auto; }
.run-row { display: grid; grid-template-columns: 28px 64px 1fr auto auto; gap: 14px; align-items: center; padding: 11px 18px; border-bottom: 1px solid var(--border-2); transition: background .12s, border-left .12s; border-left: 3px solid transparent; }
.run-row:nth-child(even) { background: oklch(0.985 0.004 80 / 0.5); }
.run-row:last-child { border-bottom: 0; }
.run-row:hover { background: var(--hover); border-left-color: var(--accent); }
.run-row .stat { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--ff-mono); font-size: 11px; font-weight: 700; background: var(--bg-2); color: var(--ink-4); flex-shrink: 0; }
.run-row.run .stat { background: var(--accent-bg); color: var(--accent); border: 1.5px solid var(--accent); border-top-color: transparent; animation: spin 0.9s linear infinite; }
.run-row.pass .stat { background: var(--pass-bg); color: var(--pass); }
.run-row.warn .stat, .run-row.suspicious .stat, .run-row.inconclusive .stat { background: var(--warn-bg); color: var(--warn); }
.run-row.fail .stat { background: var(--fail-bg); color: var(--fail); }
.run-row.skip .stat { background: var(--bg-2); color: var(--ink-4); }
@keyframes spin { to { transform: rotate(360deg); } }
.run-row .id { font-family: var(--ff-mono); font-size: 11.5px; color: var(--ink-3); font-weight: 500; }
.run-row .ttl { font-size: 13.5px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.run-row.pending .ttl { color: var(--ink-3); }
.run-row .lat { font-family: var(--ff-mono); font-size: 11.5px; color: var(--ink-3); min-width: 56px; text-align: right; }
.run-row .state { font-family: var(--ff-mono); font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; padding: 3px 9px; border-radius: 100px; min-width: 76px; text-align: center; }
.run-row.pending .state { background: var(--bg-2); color: var(--ink-4); }
.run-row.run .state { background: var(--accent-bg); color: var(--accent); }
.run-row.pass .state { background: var(--pass-bg); color: var(--pass); }
.run-row.warn .state, .run-row.suspicious .state, .run-row.inconclusive .state { background: var(--warn-bg); color: var(--warn); }
.run-row.fail .state { background: var(--fail-bg); color: var(--fail); }
.run-row.skip .state { background: var(--bg-2); color: var(--ink-4); }
.run-group-h { display: flex; align-items: center; justify-content: space-between; padding: 9px 18px; background: var(--bg-3); border-bottom: 1px solid var(--border-2); font-family: var(--ff-mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-3); font-weight: 500; }
.run-group-h .lbl { display: flex; align-items: center; gap: 8px; }
.run-group-h .lbl .code { background: var(--ink); color: oklch(1 0 0 / 0.95); padding: 2px 7px; border-radius: 4px; font-size: 10px; letter-spacing: 0; font-weight: 600; }

/* Category sidebar */
.cat-stack { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 18px 18px; }
.cat-stack .ttl { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 12px; }
.cat-stack .row { padding: 10px 0; border-bottom: 1px solid var(--border-2); }
.cat-stack .row:last-child { border-bottom: 0; padding-bottom: 0; }
.cat-stack .row .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }

.cat-stack .row .bar i.w { background: var(--warn); }
.cat-stack .row .bar i.f { background: var(--fail); }

/* ===== REPORT PAGE ===== */
.report-pg { padding: 28px 28px 80px; max-width: 1280px; margin: 0 auto; }
.rep-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
.rep-head .left { display: flex; align-items: center; gap: 12px; }
.rep-head .crumb { display: flex; align-items: center; gap: 8px; font-family: var(--ff-mono); font-size: 12px; color: var(--ink-3); flex-wrap: wrap; }
.rep-head .crumb b { color: var(--ink); font-weight: 500; }
.rep-actions { display: flex; gap: 8px; }

/* Error banner */
.error-banner { background: var(--fail-bg); border: 1px solid oklch(0.60 0.20 27 / 0.30); border-radius: 20px; padding: 40px 32px; text-align: center; margin-bottom: 20px; }

.error-banner .hint { margin-top: 16px; font-size: 12px; color: var(--ink-3); }

/* Bento grid */
.bento { display: grid; grid-template-columns: repeat(12, 1fr); grid-auto-rows: minmax(80px, auto); gap: 12px; margin-bottom: 18px; }
.bento .tile { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 22px 24px; position: relative; overflow: hidden; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
.bento .tile:hover { box-shadow: 0 1px 0 oklch(1 0 0 / 0.5) inset, 0 8px 24px -8px oklch(0.18 0.012 270 / 0.10); }
.bento .tile.dark { background: var(--ink); color: oklch(1 0 0 / 0.94); }
.bento .tile.dark .v, .bento .tile.dark .ttl { color: oklch(1 0 0 / 1); }
.bento .tile.dark .k, .bento .tile.dark .d { color: oklch(1 0 0 / 0.55); }
.bento .tile.dark .meta { color: oklch(1 0 0 / 0.65); }
.bento .tile.dark::before { content: ''; position: absolute; inset: -10%; background: radial-gradient(ellipse 50% 60% at 70% 30%, oklch(0.55 0.22 268 / 0.25), transparent 60%), radial-gradient(ellipse 40% 50% at 30% 80%, oklch(0.65 0.20 320 / 0.18), transparent 60%); filter: blur(50px); pointer-events: none; }
.bento .tile.dark.verdict.pass { background: linear-gradient(135deg, oklch(0.14 0.04 152), oklch(0.18 0.06 152), oklch(0.13 0.03 170)); }
.bento .tile.dark.verdict.pass::before { background: radial-gradient(ellipse 50% 60% at 70% 30%, oklch(0.55 0.18 152 / 0.30), transparent 60%), radial-gradient(ellipse 40% 50% at 30% 80%, oklch(0.45 0.14 170 / 0.22), transparent 60%); }
.bento .tile.dark.verdict.fail { background: linear-gradient(135deg, oklch(0.14 0.05 27), oklch(0.18 0.07 27), oklch(0.13 0.04 15)); }
.bento .tile.dark.verdict.fail::before { background: radial-gradient(ellipse 50% 60% at 70% 30%, oklch(0.55 0.22 27 / 0.30), transparent 60%), radial-gradient(ellipse 40% 50% at 30% 80%, oklch(0.50 0.18 15 / 0.22), transparent 60%); }
.bento .tile.dark > *:not(.visual-rays) { position: relative; z-index: 1; }

/* Verdict tile */
.bento .tile.verdict { grid-column: span 12; padding: 22px 26px; display: flex; align-items: center; gap: 28px; }
.verdict .v-row { flex: 1; display: flex; align-items: center; gap: 28px; min-width: 0; }
.verdict .v-left { display: flex; flex-direction: column; gap: 8px; min-width: 0; flex: 1; }
.verdict .v-eyebrow { display: inline-flex; align-items: center; gap: 7px; padding: 4px 11px; border-radius: 100px; font-family: var(--ff-mono); font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; width: fit-content; }
.verdict.pass .v-eyebrow { background: oklch(0.62 0.16 152 / 0.18); color: oklch(0.85 0.16 152); box-shadow: inset 0 0 0 1px oklch(0.62 0.16 152 / 0.20); }
.verdict.warn .v-eyebrow { background: oklch(0.72 0.15 75 / 0.18); color: oklch(0.85 0.16 75); box-shadow: inset 0 0 0 1px oklch(0.72 0.15 75 / 0.20); }
.verdict.fail .v-eyebrow { background: oklch(0.60 0.20 27 / 0.18); color: oklch(0.85 0.18 27); box-shadow: inset 0 0 0 1px oklch(0.60 0.20 27 / 0.20); }
.verdict .v-eyebrow .d { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.verdict h1 { margin: 0; font-family: var(--ff-disp); font-size: clamp(20px, 2.1vw, 26px); font-weight: 400; letter-spacing: -0.025em; line-height: 1.2; }
.verdict h1 em { font-style: normal; font-weight: 600; background: linear-gradient(135deg, oklch(0.78 0.18 268), oklch(0.85 0.15 200)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.verdict .meta { font-family: var(--ff-mono); font-size: 11.5px; display: flex; gap: 12px; flex-wrap: wrap; color: oklch(1 0 0 / 0.55); }
.verdict .meta b { color: oklch(1 0 0 / 0.92); font-weight: 500; }
.verdict .score-ring { width: 88px; height: 88px; position: relative; flex-shrink: 0; }
.verdict .score-ring svg { width: 100%; height: 100%; }
.verdict .score-ring .track { fill: none; stroke: oklch(1 0 0 / 0.10); stroke-width: 7; }
.verdict .score-ring .bar { fill: none; stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset .8s cubic-bezier(.4,0,.2,1); stroke: url(#scoreGrad); filter: drop-shadow(0 0 10px oklch(0.65 0.20 268 / 0.5)) drop-shadow(0 0 4px oklch(0.78 0.18 200 / 0.3)); }
.verdict .score-ring .ctr { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.verdict .score-ring .ctr .n { font-family: var(--ff-disp); font-size: 26px; font-weight: 500; letter-spacing: -0.035em; color: oklch(1 0 0 / 1); line-height: 1; }
.verdict .score-ring .ctr .l { font-family: var(--ff-mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: oklch(1 0 0 / 0.55); margin-top: 2px; }
.verdict .v-tally { display: grid; grid-template-columns: repeat(3, auto); gap: 18px; text-align: right; }
.verdict .vt-item .n { font-family: var(--ff-disp); font-size: 22px; font-weight: 500; letter-spacing: -0.025em; line-height: 1; }
.verdict .vt-item.pass .n { color: oklch(0.78 0.16 152); }
.verdict .vt-item.warn .n { color: oklch(0.85 0.16 75); }
.verdict .vt-item.fail .n { color: oklch(0.78 0.18 27); }
.verdict .vt-item .l { margin-top: 3px; font-family: var(--ff-mono); font-size: 9px; color: oklch(1 0 0 / 0.55); text-transform: uppercase; letter-spacing: 0.06em; }
.verdict .visual-rays { position: absolute; right: -40px; top: -50px; width: 240px; height: 240px; background: conic-gradient(from 200deg, transparent 0deg, oklch(0.55 0.22 268 / 0.35) 40deg, oklch(0.65 0.20 320 / 0.20) 80deg, transparent 120deg); border-radius: 50%; opacity: 0.7; pointer-events: none; z-index: 0; }
.verdict > *:not(.visual-rays) { position: relative; z-index: 1; }

/* Metric tiles */
.tile.metric { grid-column: span 4; padding: 16px 18px; }
.tile.metric .k { font-family: var(--ff-mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-3); }

.pipeline-stage .stg-chip.pass { background: var(--pass-bg); color: var(--pass); }
.pipeline-stage .stg-chip.fail { background: var(--fail-bg); color: var(--fail); }

/* Category bars tile */
.tile.catbars { grid-column: span 7; grid-row: span 2; padding: 18px 20px; }
.tile.catbars .h { display: flex; justify-content: space-between; margin-bottom: 14px; }
.tile.catbars .h .ttl { font-size: 14px; font-weight: 600; }
.tile.catbars .h .sub { font-family: var(--ff-mono); font-size: 11.5px; color: var(--ink-3); }
.cb-row { display: grid; grid-template-columns: 80px 1fr auto; gap: 16px; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border-2); }
.cb-row:last-child { border-bottom: 0; }
.cb-row .code { font-family: var(--ff-mono); font-size: 11px; font-weight: 600; background: var(--bg-2); border: 1px solid var(--border); padding: 3px 8px; border-radius: 5px; color: var(--ink-2); text-align: center; width: fit-content; }
.cb-row .bar { height: 6px; border-radius: 100px; background: var(--bg-3); display: flex; overflow: hidden; }
.cb-row .bar i { display: block; height: 100%; font-style: normal; transition: width .5s cubic-bezier(.4,0,.2,1); }
.cb-row .bar i.p { background: var(--pass); }
.cb-row .bar i.w { background: var(--warn); }
.cb-row .bar i.f { background: var(--fail); }
.cb-row .pct { font-family: var(--ff-disp); font-size: 16px; font-weight: 500; color: var(--ink); min-width: 50px; text-align: right; letter-spacing: -0.02em; }

/* Issues tile */
.tile.issues { grid-column: span 5; grid-row: span 2; padding: 16px 18px; }
.tile.issues .h { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }

.iss-row .ic { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--ff-mono); font-size: 11px; font-weight: 700; flex-shrink: 0; }
.iss-row.fail .ic { background: var(--fail-bg); color: var(--fail); }
.iss-row.warn .ic, .iss-row.suspicious .ic { background: var(--warn-bg); color: var(--warn); }

.iss-id { margin-top: 2px; font-family: var(--ff-mono); font-size: 11px; color: var(--ink-3); }

/* Report filter controls */
.rep-controls { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--panel); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 12px; flex-wrap: wrap; }
.rep-controls .grp { display: flex; gap: 4px; flex-wrap: wrap; }
.rep-controls .chip { padding: 5px 12px; border-radius: 100px; background: var(--bg-2); font-size: 12px; font-weight: 500; color: var(--ink-2); border: 1px solid transparent; display: inline-flex; align-items: center; gap: 6px; transition: all .12s; }
.rep-controls .chip:hover { background: var(--hover); color: var(--ink); }
.rep-controls .chip.on { background: var(--ink); color: oklch(1 0 0 / 0.96); }
.rep-controls .chip .ct { font-family: var(--ff-mono); font-size: 10.5px; opacity: 0.7; }
.rep-controls .grp-sep { width: 1px; height: 22px; background: var(--border); }
.rep-controls .search { flex: 1; min-width: 200px; display: flex; align-items: center; height: 32px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 100px; padding: 0 14px; gap: 8px; }

/* Check list */

.check-list .row { display: grid; grid-template-columns: 28px 70px 70px 1fr 80px 90px 16px; gap: 12px; padding: 12px 18px; align-items: center; border-bottom: 1px solid var(--border-2); cursor: pointer; transition: background .12s, border-left .12s; border-left: 3px solid transparent; }
.check-list .row:nth-child(even) { background: oklch(0.985 0.004 80 / 0.5); }
.check-list .row:last-child { border-bottom: 0; }
.check-list .row:hover { background: var(--hover); border-left-color: var(--accent); }
.check-list .row .stat { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--ff-mono); font-size: 11px; font-weight: 700; }
.check-list .row.pass .stat { background: var(--pass-bg); color: var(--pass); }
.check-list .row.warn .stat, .check-list .row.suspicious .stat, .check-list .row.inconclusive .stat { background: var(--warn-bg); color: var(--warn); }
.check-list .row.fail .stat { background: var(--fail-bg); color: var(--fail); }
.check-list .row.skip .stat { background: var(--bg-2); color: var(--ink-4); }

  { value: 'any', label: 'Any / Unknown' },
  { value: 'openai', label: 'OpenAI' },
  { value: 'anthropic', label: 'Anthropic' },
  { value: 'gemini', label: 'Gemini' },
];

// ===================== UTILITIES =====================
const pad = (n, w = 3) => String(n).padStart(w, '0');
const fmtMs = (ms) => ms == null || ms === 0 ? '\u2014' : (ms >= 1000 ? (ms / 1000).toFixed(1) + 's' : Math.round(ms) + 'ms');
const esc = (s) => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
const shortHost = (url) => (url || '').replace(/^https?:\/\//, '').split('/')[0];

function getMyTaskIds() {
  try { return JSON.parse(localStorage.getItem('routerx_my_tasks') || '[]'); } catch { return []; }
}
function saveMyTaskId(id) {
  const ids = getMyTaskIds();
  if (!ids.includes(id)) { ids.unshift(id); localStorage.setItem('routerx_my_tasks', JSON.stringify(ids.slice(0, 200))); }
}

function verdictColor(v) {
  if (v === 'pass') return 'var(--pass)';
  if (v === 'fail') return 'var(--fail)';
  if (v === 'suspicious') return 'var(--suspicious)';
  return 'var(--warn)';
}

function verdictSymbol(v) {
  if (v === 'pass') return '\u2713';
  if (v === 'fail') return '\u2715';
  if (v === 'suspicious') return '!';
  if (v === 'skip') return '\u2014';
  return '?';
}

function computeScore(report) {
  if (!report) return 0;
  const total = report.total_detectors || 1;
  return Math.round((report.passed || 0) / total * 100);
}

function computeVerdict(report) {
  if (!report) return 'pass';
  if ((report.failed || 0) > 0) return 'fail';
  if ((report.suspicious || 0) > 0) return 'warn';
  return 'pass';
}

// ===================== SVG LOGO =====================
function Logo({ size = 18 }) {
  return (
    <svg viewBox="15 48 170 104" fill="none" width={size} height={size * 104 / 170}>
      <path d="M30 60L80 100L30 140" stroke="rgba(255,255,255,0.35)" strokeWidth="20" strokeLinejoin="round" strokeLinecap="round"/>
      <path d="M75 60L125 100L75 140" stroke="rgba(255,255,255,0.65)" strokeWidth="20" strokeLinejoin="round" strokeLinecap="round"/>
      <path d="M120 60L170 100L120 140" stroke="white" strokeWidth="20" strokeLinejoin="round" strokeLinecap="round"/>
    </svg>
  );
}

// ===================== SETUP SCREEN =====================
function SetupScreen({ onStart }) {
  const [endpoint, setEndpoint] = useState('');
  const [apiKey, setApiKey] = useState('');
  const [model, setModel] = useState('');
  const [provider, setProvider] = useState('any');
  const [capabilities, setCapabilities] = useState(new Set(['text']));
  const [scanMode, setScanMode] = useState('full');
  const [showAdvanced, setShowAdvanced] = useState(false);
  const [authMethod, setAuthMethod] = useState('bearer');
  const [timeout, setTimeout_] = useState(60);
  const [concurrency, setConcurrency] = useState(3);
  const [directEndpoint, setDirectEndpoint] = useState('');
  const [directApiKey, setDirectApiKey] = useState('');
  const [secondApiKey, setSecondApiKey] = useState('');
  const [routing, setRouting] = useState('');
  const [fetchedModels, setFetchedModels] = useState([]);
  const [selectedModels, setSelectedModels] = useState(new Set());
  const [fetchingModels, setFetchingModels] = useState(false);
  const [modelFilter, setModelFilter] = useState('');

  const toggleCap = (c) => {
    const next = new Set(capabilities);
    if (next.has(c)) next.delete(c); else next.add(c);
    setCapabilities(next);
  };

  const fetchModels = async () => {
    if (!endpoint || !apiKey) return;
    setFetchingModels(true);
    try {
      const r = await fetch(API_BASE + '/api/v1/probe-models', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ router_endpoint: endpoint, api_key: apiKey, auth_method: authMethod }),
      });
      if (!r.ok) throw new Error(await r.text());
      const models = await r.json();
      setFetchedModels(models);
      setSelectedModels(new Set());
    } catch (e) {
      console.error('Fetch models failed:', e);
    }
    setFetchingModels(false);
  };

  const filteredModels = useMemo(() => {
    if (!modelFilter) return fetchedModels;
    const q = modelFilter.toLowerCase();
    return fetchedModels.filter(m => m.id.toLowerCase().includes(q) || (m.owned_by || '').toLowerCase().includes(q));
  }, [fetchedModels, modelFilter]);

  const toggleModel = (id) => {
    const next = new Set(selectedModels);
    if (next.has(id)) next.delete(id); else next.add(id);
    setSelectedModels(next);
  };

  const getModels = () => {
    if (selectedModels.size > 0) return [...selectedModels];
    const typed = model.trim();
    if (typed) return typed.split(',').map(s => s.trim()).filter(Boolean);
    return ['gpt-4o'];
  };

  const start = () => {
    if (!endpoint) return;
    const models = getModels();
    onStart({
      endpoint, apiKey, models, provider, capabilities: [...capabilities],
      scanMode, authMethod, timeout, concurrency, directEndpoint, directApiKey,
      secondApiKey, routing: routing || null,
    });
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter') start();
  };

  return (
    <div className="home" onKeyDown={handleKeyDown}>
      <div className="home-hero">
        <div className="home-eyebrow">
          <span className="pulse" />
          <span>Security Diagnostics</span>
          <span className="badge">v2.0</span>
        </div>
        <h1 className="home-title">
          Audit any LLM router<br/>
          <em>across 85 security detectors.</em>
        </h1>
        <p className="home-sub">
          Detect model substitution, billing fraud, parameter manipulation,
          supply-chain attacks, and session leakage in any OpenAI-compatible endpoint.
        </p>
      </div>

      <div className="form-card">
        <div className="form-card-head">
          <div className="l"><span className="step">1</span><span>Configure target endpoint</span></div>
          <div className="r">{scanMode === 'full' ? '85 detectors' : '~40 detectors'}</div>
        </div>
        <div className="form-body">
          <div className="field-block">
            <div className="field-label">
              <span className="l">Router Endpoint</span>
              <span className="h">base URL for API calls</span>
            </div>
            <div className="input">
              <span className="pre">URL</span>
              <input type="text" className="mono" value={endpoint}
                onChange={e => setEndpoint(e.target.value)}
                placeholder="https://api.example.com/v1" />
            </div>
          </div>

          <div className="field-row">
            <div className="field-block" style={{ marginBottom: 0 }}>
              <div className="field-label">
                <span className="l">API Key</span>
                <span className="h">stored in session memory</span>
              </div>
              <div className="input">
                <span className="pre">Key</span>
                <input type="password" className="mono" value={apiKey}
                  onChange={e => setApiKey(e.target.value)} placeholder="sk-..." />
              </div>
            </div>
            <div className="field-block" style={{ marginBottom: 0 }}>
              <div className="field-label">
                <span className="l">Model</span>
                <span className="h">used in probe payloads</span>
              </div>
              <div className="input">
                <input type="text" className="mono" value={model}
                  onChange={e => { setModel(e.target.value); setModelFilter(e.target.value); }}
                  placeholder="gpt-4o" />
                <button className="post" onClick={fetchModels} disabled={fetchingModels} style={{ cursor: 'pointer', border: 'none', borderLeft: '1px solid var(--border)' }}>
                  {fetchingModels ? 'Fetching...' : 'Fetch Models'}
                </button>
              </div>
            </div>
          </div>

          {fetchedModels.length > 0 && (
            <div style={{ marginTop: 12 }}>
              <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 8 }}>
                <span style={{ fontFamily: 'var(--ff-mono)', fontSize: 11, color: 'var(--ink-3)' }}>
                  {selectedModels.size} selected / {filteredModels.length} shown
                </span>
                <button className="btn-ghost btn-sm" onClick={() => { const next = new Set(); filteredModels.forEach(m => next.add(m.id)); setSelectedModels(next); }}>Select All</button>
                <button className="btn-ghost btn-sm" onClick={() => setSelectedModels(new Set())}>Clear</button>
              </div>
              <div className="model-grid">
                {filteredModels.map(m => (
                  <div key={m.id} className={'model-chip' + (selectedModels.has(m.id) ? ' on' : '')} onClick={() => toggleModel(m.id)}>
                    {m.id}
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="field-block" style={{ marginTop: 18 }}>
            <div className="field-label">
              <span className="l">Provider</span>
              <span className="h">claimed upstream provider</span>
            </div>
            <div className="input">
              <select value={provider} onChange={e => setProvider(e.target.value)} style={{ flex: 1, padding: '0 16px', background: 'transparent', border: 0, outline: 'none', fontSize: '14px' }}>
                {PROVIDERS.map(p => <option key={p.value} value={p.value}>{p.label}</option>)}
              </select>
            </div>
          </div>

          <div className="field-block">
            <div className="field-label">
              <span className="l">Capabilities</span>
              <span className="h">what the endpoint supports</span>
            </div>
            <div className="caps-row">
              {CAPABILITIES.map(c => (
                <button key={c} className={'cap-chip' + (capabilities.has(c) ? ' on' : '')} onClick={() => toggleCap(c)}>
                  <span className="ck">{capabilities.has(c) ? '\u2713' : ''}</span>
                  <span>{c}</span>
                </button>
              ))}
            </div>
          </div>

          <div className="field-block" style={{ marginTop: 18, marginBottom: 0 }}>
            <div className="field-label">
              <span className="l">Scan Mode</span>
              <span className="h">{scanMode === 'full' ? '85 detectors ~ 60s' : '~40 detectors ~ 30s'}</span>
            </div>
            <div className="mode-seg">
              <button className={'mode-card' + (scanMode === 'essential' ? ' on' : '')} onClick={() => setScanMode('essential')}>
                <span className="mt">~40</span>
                <div className="mn">Essential</div>
                <div className="md">critical + identity</div>
              </button>
              <button className={'mode-card' + (scanMode === 'full' ? ' on' : '')} onClick={() => setScanMode('full')}>
                <span className="mt">85</span>
                <div className="mn">Full suite</div>
                <div className="md">all detectors</div>
              </button>
            </div>
          </div>

          <div className={'adv-toggle' + (showAdvanced ? ' open' : '')} onClick={() => setShowAdvanced(!showAdvanced)}>
            <span className="arrow">{'\u203a'}</span>
            <span>Advanced Options</span>
          </div>
          <div className={'adv-body' + (showAdvanced ? ' open' : '')}>
            <div className="field-row" style={{ marginBottom: 12 }}>
              <div className="field-block" style={{ marginBottom: 0 }}>
                <div className="field-label"><span className="l">Auth Method</span></div>
                <div className="input">
                  <select value={authMethod} onChange={e => setAuthMethod(e.target.value)} style={{ flex: 1, padding: '0 16px', background: 'transparent', border: 0, outline: 'none', fontSize: '14px' }}>
                    <option value="bearer">Bearer Token</option>
                    <option value="x-api-key">X-API-Key</option>
                    <option value="query">Query Param</option>
                  </select>
                </div>
              </div>
              <div className="field-block" style={{ marginBottom: 0 }}>
                <div className="field-label"><span className="l">Routing</span></div>
                <div className="input">
                  <input type="text" className="mono" value={routing} onChange={e => setRouting(e.target.value)} placeholder="optional routing header" />
                </div>
              </div>
            </div>
            <div className="field-row" style={{ marginBottom: 12 }}>
              <div className="field-block" style={{ marginBottom: 0 }}>
                <div className="field-label"><span className="l">Timeout (seconds)</span></div>
                <div className="input">
                  <input type="number" value={timeout} onChange={e => setTimeout_(parseInt(e.target.value) || 60)} min="5" max="120" style={{ flex: 1, padding: '0 16px', background: 'transparent', border: 0, outline: 'none', fontSize: '14px' }} />
                </div>
              </div>
              <div className="field-block" style={{ marginBottom: 0 }}>
                <div className="field-label"><span className="l">Concurrency</span></div>
                <div className="input">
                  <input type="number" value={concurrency} onChange={e => setConcurrency(parseInt(e.target.value) || 3)} min="1" max="10" style={{ flex: 1, padding: '0 16px', background: 'transparent', border: 0, outline: 'none', fontSize: '14px' }} />
                </div>

            <div className="adv-section">
              <div className="adv-title">Second Router API Key (Optional)</div>
              <div className="adv-desc">A different API key for the same router. Enables D100 cross-key isolation test.</div>
              <div className="field-block" style={{ marginBottom: 0 }}>
                <div className="input">
                  <input type="password" className="mono" value={secondApiKey} onChange={e => setSecondApiKey(e.target.value)} placeholder="sk-... (different key, same router)" />

            <div className="adv-section">
              <div className="adv-title">Direct Provider Baseline (Optional)</div>
              <div className="adv-desc">The real provider endpoint. Enables D48 amount precision baseline and D50 semantic negation comparison.</div>
              <div className="field-block" style={{ marginBottom: 8 }}>
                <div className="input">
                  <input type="text" className="mono" value={directEndpoint} onChange={e => setDirectEndpoint(e.target.value)} placeholder="https://api.openai.com" />
                </div>
              </div>
              <div className="field-block" style={{ marginBottom: 0 }}>
                <div className="input">
                  <input type="password" className="mono" value={directApiKey} onChange={e => setDirectApiKey(e.target.value)} placeholder="Direct provider API key" />
