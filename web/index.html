          <div className="form-foot">
            <div className="foot-hint">
              Press <span className="kbd">Enter</span> to run
            </div>
            <button className="btn-primary" onClick={start} disabled={!endpoint}>
              <span>Start security audit</span>
              <span className="arrow">{'\u2192'}</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ===================== RUNNING SCREEN =====================
function RunningScreen({ taskId, config, detectors, onCancel, onComplete }) {
  const [progress, setProgress] = useState({});
  const [done, setDone] = useState(0);
  const [total, setTotal] = useState(85);
  const [elapsed, setElapsed] = useState(0);
  const [currentDetector, setCurrentDetector] = useState(null);
  const wsRef = useRef(null);
  const startTimeRef = useRef(Date.now());
  const timerRef = useRef(null);

  useEffect(() => {
    startTimeRef.current = Date.now();
    timerRef.current = setInterval(() => {
      setElapsed(Math.floor((Date.now() - startTimeRef.current) / 1000));
    }, 1000);

    const wsUrl = API_BASE.replace(/^http/, 'ws') + '/api/v1/tests/' + taskId + '/ws';
    const ws = new WebSocket(wsUrl);
    wsRef.current = ws;

    ws.onmessage = (e) => {
      const ev = JSON.parse(e.data);
      if (ev.progress) {
        const [d, t] = ev.progress.split('/').map(Number);
        setDone(d); setTotal(t);
      }
      if (ev.type === 'detector_start') {
        setCurrentDetector(ev.data);
        setProgress(p => ({ ...p, [ev.data.id]: 'running' }));
      }
      if (ev.type === 'detector_end') {
        setProgress(p => ({ ...p, [ev.data.id]: ev.data }));
      }
      if (ev.type === 'task_end') {
        ws.close();
        clearInterval(timerRef.current);
        onComplete(taskId);
      }
    };

    ws.onerror = () => { pollFallback(); };
    ws.onclose = (e) => { if (e.code !== 1000) pollFallback(); };

    let pollActive = false;
    const pollFallback = async () => {
      if (pollActive) return;
      pollActive = true;
      for (let i = 0; i < 300; i++) {
        await new Promise(r => setTimeout(r, 3000));
        try {
          const r = await fetch(API_BASE + '/api/v1/tests/' + taskId);
          if (!r.ok) continue;
          const t = await r.json();
          if (t.progress) {
            const [d, tt] = t.progress.split('/').map(Number);
            setDone(d); setTotal(tt);
          }
          if (['completed', 'failed', 'cancelled'].includes(t.status)) {
            clearInterval(timerRef.current);
            onComplete(taskId);
            return;
          }
        } catch {}
      }
    };

    return () => {
      ws.close();
      clearInterval(timerRef.current);
    };
  }, [taskId]);

  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const ringR = 60;
  const ringC = 2 * Math.PI * ringR;
  const ringDash = ringC * (1 - pct / 100);

  const tallies = useMemo(() => {
    let pass = 0, fail = 0, warn = 0, run = 0;
    Object.values(progress).forEach(v => {
      if (v === 'running') { run++; return; }
      if (v && typeof v === 'object') {
        if (v.verdict === 'pass') pass++;
        else if (v.verdict === 'fail') fail++;
        else warn++;
      }
    });
    return { pass, fail, warn, run };
  }, [progress]);

  const remaining = total - done;
  const eta = remaining > 0 ? Math.max(1, Math.round(remaining * 0.7)) : 0;

  // Group detectors by priority
  const groups = useMemo(() => {
    if (!detectors || detectors.length === 0) return [];
    const byPri = {};
    detectors.forEach(d => {
      const pri = d.priority || 'P1';
      if (!byPri[pri]) byPri[pri] = [];
      byPri[pri].push(d);
    });
    return STAGES.filter(s => byPri[s]).map(s => ({
      stage: s,
      label: STAGE_NAMES[s] || s,
      items: byPri[s],
    }));
  }, [detectors]);

  return (
    <div className="running-pg">
      <div className="run-header">
        <div className="left">
          <span className="lab"><span className="pulse" style={{ background: 'var(--accent)' }} />Running suite</span>
          <span><b>{shortHost(config?.endpoint)}</b></span>
          <span>{'\u00b7'}</span>
          <span>{config?.models?.[0] || 'model'}</span>
          <span>{'\u00b7'}</span>
          <span>{elapsed}s</span>
        </div>
        <button className="cancel-btn" onClick={onCancel}>
          <span>{'\u2715'}</span>
          <span>Abort</span>
        </button>
      </div>

      <div className="run-grid">
        <div>
          <div className="run-summary-card">
            <div className="rs-head">
              <div className="rs-eyebrow">
                <span className="pulse" style={{ background: 'var(--accent)', boxShadow: '0 0 0 3px oklch(0.55 0.22 268 / 0.2)', animation: 'pulsering 1.2s ease-in-out infinite' }} />
                Live {'\u00b7'} {done} / {total} detectors
              </div>
              <div className="rs-eta">ETA <b>~{eta}s</b></div>
            </div>
            <div className="rs-body">
              <div className="run-ring-wrap">
                <svg className="run-ring" viewBox="0 0 140 140">
                  <defs>
                    <linearGradient id="runGrad" x1="0" y1="0" x2="1" y2="1">
                      <stop offset="0" stopColor="oklch(0.55 0.22 268)" />
                      <stop offset="1" stopColor="oklch(0.68 0.20 320)" />
                    </linearGradient>
                  </defs>
                  <circle className="track" cx="70" cy="70" r={ringR} />
                  <circle className="bar" cx="70" cy="70" r={ringR} strokeDasharray={ringC} strokeDashoffset={ringDash} />
                </svg>
                <div className="run-ring-center">
                  <div className="run-pct">{pct}<sup>%</sup></div>
                  <div className="lab">complete</div>
                </div>
              </div>
              <div className="rs-current">
                <div className="lab">Currently probing</div>
                <div className="ttl">{currentDetector?.name || 'Initializing...'}</div>
                <div className="ds">{currentDetector?.id || ''}</div>
              </div>
              <div className="rs-tally">
                <div className="item pass"><div className="n">{tallies.pass}</div><div className="l">pass</div></div>
                <div className="item warn"><div className="n">{tallies.warn}</div><div className="l">other</div></div>
                <div className="item fail"><div className="n">{tallies.fail}</div><div className="l">fail</div></div>
              </div>
            </div>
          </div>

          <div className="matrix-card">
            <div className="matrix-head">
              <div className="ttl">Probe matrix {'\u00b7'} {total} cells</div>
              <div className="legend">
                <span className="pl"><span className="d pending" />pending</span>
                <span className="pl"><span className="d run" />probing</span>
                <span className="pl"><span className="d pass" />pass</span>
                <span className="pl"><span className="d warn" />warn</span>
                <span className="pl"><span className="d fail" />fail</span>
              </div>
            </div>
            <div className="matrix">
              {(detectors || []).map((d, i) => {
                const r = progress[d.detector_id];
                let cls = '';
                if (r === 'running') cls = 'run';
                else if (r && typeof r === 'object') cls = r.verdict === 'pass' ? 'pass' : r.verdict === 'fail' ? 'fail' : r.verdict === 'skip' ? 'skip' : 'warn';
                return <div key={d.detector_id || i} className={'mx-cell ' + cls} title={d.detector_id + ' ' + d.detector_name} />;
              })}
            </div>
          </div>

          <div className="list-card">
            <div className="lc-head">
              <span>Detector stream</span>
              <span>{tallies.run > 0 ? `${tallies.run} active` : `${done} settled`}</span>
            </div>
            <div className="lc-body">
              {groups.map(g => (
                <div key={g.stage}>
                  <div className="run-group-h">
                    <span className="lbl">
                      <span className="code">{STAGE_LABELS[g.stage]}</span>
                      <span>{g.label}</span>
                    </span>
                    <span>{g.items.length} detectors</span>
                  </div>
                  {g.items.map(d => {
                    const r = progress[d.detector_id];
                    let state = 'pending';
                    if (r === 'running') state = 'run';
                    else if (r && typeof r === 'object') state = r.verdict || 'pass';
                    return (
                      <div key={d.detector_id} className={'run-row ' + state}>
                        <span className="stat">{state === 'run' ? '' : state === 'pending' ? '' : verdictSymbol(state)}</span>
                        <span className="id">{d.detector_id}</span>
                        <span className="ttl">{d.detector_name}</span>
                        <span className="lat">{r && typeof r === 'object' ? fmtMs(r.latency_ms) : '\u2014'}</span>
                        <span className="state">{state === 'pending' ? 'queued' : state === 'run' ? 'probing' : state}</span>
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          </div>
        </div>

        <div>
          <div className="cat-stack">
            <div className="ttl">Stages</div>
            {groups.map(g => {
              let p = 0, f = 0, w = 0, d = 0;
              g.items.forEach(det => {
                const r = progress[det.detector_id];
                if (r && typeof r === 'object') {
                  d++;
                  if (r.verdict === 'pass') p++;
                  else if (r.verdict === 'fail') f++;
                  else w++;
                }
              });
              const t = g.items.length;
              return (
                <div key={g.stage} className="row">
                  <div className="top">
                    <div className="l">
                      <span className="code">{STAGE_LABELS[g.stage]}</span>
                      <span>{g.label}</span>
                    </div>
                    <div className="ct">{d} / {t}</div>
                  </div>
                  <div className="bar">
                    <i className="p" style={{ width: t ? (p / t * 100) + '%' : 0 }} />
                    <i className="w" style={{ width: t ? (w / t * 100) + '%' : 0 }} />
                    <i className="f" style={{ width: t ? (f / t * 100) + '%' : 0 }} />
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ===================== REPORT SCREEN =====================
function ReportScreen({ report, taskId, config, onReset }) {
  const [filter, setFilter] = useState('all');
  const [priFilter, setPriFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [openIdx, setOpenIdx] = useState(null);

  // ALL hooks MUST be called before any conditional return (Rules of Hooks)
  const results = (report && report.results) || [];

  const catBars = useMemo(() => {
    if (!results.length) return [];
    const m = {};
    results.forEach(d => {
      const p = d.priority || 'P1';
      if (!m[p]) m[p] = { pass: 0, fail: 0, warn: 0, skip: 0, total: 0 };
      m[p].total++;
      if (d.verdict === 'pass') m[p].pass++;
      else if (d.verdict === 'fail') m[p].fail++;
      else if (d.verdict === 'skip') m[p].skip++;
      else m[p].warn++;
    });
    return STAGES.filter(s => m[s]).map(s => ({
      stage: s,
      label: STAGE_LABELS[s],
      name: STAGE_NAMES[s],
      ...m[s],
      pct: m[s].total ? Math.round(m[s].pass / m[s].total * 100) : 0,
    }));
  }, [results]);

  const issues = useMemo(() =>
    results.filter(d => d.verdict === 'fail' || d.verdict === 'suspicious')
      .sort((a, b) => a.verdict === b.verdict ? 0 : a.verdict === 'fail' ? -1 : 1)
      .slice(0, 8),
  [results]);

  const sorted = useMemo(() =>
    [...results].sort((a, b) => {
      const pi = STAGES.indexOf(a.priority) - STAGES.indexOf(b.priority);
      return pi || VERDICTS.indexOf(a.verdict) - VERDICTS.indexOf(b.verdict);
    }),
  [results]);

  const filtered = useMemo(() => sorted.filter(d => {
    if (filter !== 'all' && d.verdict !== filter) return false;
    if (priFilter !== 'all' && d.priority !== priFilter) return false;
    if (search) {
      const q = search.toLowerCase();
      if (!d.detector_id.toLowerCase().includes(q) && !d.detector_name.toLowerCase().includes(q)) return false;
    }
    return true;
  }), [sorted, filter, priFilter, search]);

  const opened = openIdx !== null ? filtered[openIdx] : null;

  useEffect(() => {
    if (!opened) return;
    const onKey = (e) => {
      if (e.key === 'Escape') setOpenIdx(null);
      if (e.key === 'ArrowDown' && openIdx < filtered.length - 1) setOpenIdx(openIdx + 1);
      if (e.key === 'ArrowUp' && openIdx > 0) setOpenIdx(openIdx - 1);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [opened, openIdx, filtered.length]);

  // --- All hooks called above. Conditional returns safe below. ---

  if (!report) return <div className="loading-center"><div className="spinner" /><div>Loading report...</div></div>;

  if (report.error_code !== undefined && report.error_code !== null) {
    return (
      <div className="report-pg">
        <div className="error-banner">
          <div style={{ fontSize: 48 }}>{'\u26a0'}</div>
          <h2>Endpoint Error</h2>
          <div className="code">{report.error_code === 0 ? 'Network Error' : 'HTTP ' + report.error_code}</div>
          <div className="msg">{report.error_msg || 'Unknown error'}</div>
          <div className="hint">All detectors were skipped. Please check the endpoint URL and API key.</div>
          <button className="btn-dark" style={{ marginTop: 20 }} onClick={onReset}>Try again {'\u2192'}</button>
        </div>
      </div>
    );
  }

  const score = computeScore(report);
  const verdict = report.overall_verdict === 'pass' ? 'pass' : (report.failed || 0) > 0 ? 'fail' : 'warn';
  const sec = ((report.total_latency_ms || 0) / 1000).toFixed(1);
  const cost = (report.estimated_cost_usd || 0).toFixed(2);
  const inconclusive = (report.total_detectors || 0) - (report.passed || 0) - (report.failed || 0) - (report.suspicious || 0) - (report.skipped || 0);
  const scoreR = 52;
  const scoreC = 2 * Math.PI * scoreR;
  const scoreDash = scoreC * (1 - score / 100);
  const byPri = {};
  results.forEach(d => { const p = d.priority || 'P1'; (byPri[p] = byPri[p] || []).push(d); });

  const shareUrl = taskId ? `${window.location.origin}/task/${taskId}` : '';

  const copyLink = () => {
    if (shareUrl) navigator.clipboard.writeText(shareUrl);
  };

  const exportJSON = () => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' }));
    a.download = 'audit-report.json';
    a.click();
  };

  return (
    <div className="report-pg">
      <div className="rep-head">
        <div className="left">
          <div className="crumb">
            <span>Task</span>
            <b>{taskId ? taskId.slice(0, 8) : 'local'}</b>
            <span>{'\u00b7'}</span>
            <b>{shortHost(report.router_endpoint || config?.endpoint)}</b>
            <span>{'\u00b7'}</span>
            <b>{report.claimed_model || config?.models?.[0]}</b>
          </div>
        </div>
        <div className="rep-actions">
          <button className="btn-ghost" onClick={exportJSON}>Export JSON</button>
          {shareUrl && <button className="btn-ghost" onClick={copyLink}>Share link</button>}
          <button className="btn-dark" onClick={onReset}>Run again {'\u2192'}</button>
        </div>
      </div>

      <div className="bento">
        {/* Hero verdict */}
        <div className={'tile dark verdict ' + verdict}>
          <div className="visual-rays" />
          <div className="v-row">
            <div className="v-left">
              <div className="v-eyebrow"><span className="d" />
                {verdict === 'pass' ? 'All systems nominal' : verdict === 'warn' ? 'Conditional pass' : 'Action required'}
              </div>
              <h1>
                {verdict === 'pass'
                  ? <>Endpoint verified {'\u2014'} <em>{report.tier_assignment || 'TIER_1'}</em></>
                  : verdict === 'warn'
                    ? <>Endpoint <em>mostly conforms</em>, with caveats.</>
                    : <>Endpoint has <em>{report.failed} security issues</em> detected.</>
                }
              </h1>
              <div className="meta">
                <span><b>{report.total_detectors}</b> detectors</span>
                <span>{'\u00b7'} <b>{sec}s</b> wall</span>
                <span>{'\u00b7'} <b>${cost}</b> est. cost</span>
                {report.avg_tps && <span>{'\u00b7'} <b>{report.avg_tps.toFixed(0)} tok/s</b></span>}
              </div>
            </div>
            <div className="score-ring">
              <svg viewBox="0 0 120 120">
                <defs>
                  <linearGradient id="scoreGrad" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0" stopColor="oklch(0.78 0.18 268)" />
                    <stop offset="1" stopColor="oklch(0.85 0.15 200)" />
                  </linearGradient>
                </defs>
                <circle className="track" cx="60" cy="60" r={scoreR} />
                <circle className="bar" cx="60" cy="60" r={scoreR}
                  strokeDasharray={scoreC} strokeDashoffset={scoreDash}
                  transform="rotate(-90 60 60)" />
              </svg>
              <div className="ctr"><div className="n">{score}</div><div className="l">pass %</div></div>
            </div>
            <div className="v-tally">
              <div className="vt-item pass"><div className="n">{report.passed || 0}</div><div className="l">pass</div></div>
              <div className="vt-item warn"><div className="n">{(report.suspicious || 0) + inconclusive}</div><div className="l">other</div></div>
              <div className="vt-item fail"><div className="n">{report.failed || 0}</div><div className="l">fail</div></div>
            </div>
          </div>
        </div>

        {/* Metric tiles */}
        <div className="tile metric">
          <div className="k">Avg latency</div>
          <div className="v">{fmtMs(report.avg_latency_ms)}</div>
          <div className="d">across {report.total_detectors} detectors</div>
        </div>
        <div className="tile metric">
          <div className="k">Throughput</div>
          <div className="v">{report.avg_tps ? report.avg_tps.toFixed(1) : '\u2014'}<sup>tok/s</sup></div>
          <div className="d">sustained output rate</div>
        </div>
        <div className="tile metric">
          <div className="k">Total tokens</div>
          <div className="v">{((report.total_input_tokens || 0) + (report.total_output_tokens || 0)).toLocaleString()}</div>
          <div className="d">{(report.total_input_tokens || 0).toLocaleString()} in / {(report.total_output_tokens || 0).toLocaleString()} out</div>
        </div>

        {/* Pipeline */}
        <div className="tile pipeline">
          <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 14 }}>Detection Pipeline</div>
          <div className="pipeline-stages">
            {STAGES.filter(s => byPri[s]).map(s => (
              <div key={s} className="pipeline-stage">
                <div className="stg-label">{STAGE_LABELS[s]}</div>
                <div className="stg-chips">
                  {(byPri[s] || []).sort((a, b) => VERDICTS.indexOf(a.verdict) - VERDICTS.indexOf(b.verdict)).map(d => (
                    <span key={d.detector_id} className={'stg-chip ' + d.verdict} title={d.detector_name + ': ' + d.verdict}>
                      {d.detector_id}
                    </span>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Category bars */}
        <div className="tile catbars">
          <div className="h">
            <div className="ttl">Stage breakdown</div>
            <div className="sub">sorted by pipeline order</div>
          </div>
          {catBars.map(c => (
            <div className="cb-row" key={c.stage}>
              <div className="code">{c.label}</div>
              <div className="bar">
                <i className="p" style={{ width: c.total ? (c.pass / c.total * 100) + '%' : 0 }} />
                <i className="w" style={{ width: c.total ? (c.warn / c.total * 100) + '%' : 0 }} />
                <i className="f" style={{ width: c.total ? (c.fail / c.total * 100) + '%' : 0 }} />
              </div>
              <div className="pct">{c.pct}<sup style={{ fontSize: 10, color: 'var(--ink-3)' }}>%</sup></div>
            </div>
          ))}
        </div>

        {/* Issues */}
        <div className="tile issues">
          <div className="h">
            <div className="ttl">Top issues</div>
            <div className="sub">{report.failed || 0} fail {'\u00b7'} {report.suspicious || 0} suspicious</div>
          </div>
          {issues.length === 0 && (
            <div style={{ padding: '20px 0', textAlign: 'center', color: 'var(--ink-3)', fontSize: 13 }}>
              No issues detected {'\u2713'}
            </div>
          )}
          {issues.map((it, k) => (
            <div key={k} className={'iss-row ' + it.verdict} onClick={() => { const idx = filtered.findIndex(f => f.detector_id === it.detector_id); if (idx >= 0) setOpenIdx(idx); }}>
              <span className="ic">{it.verdict === 'fail' ? '\u2715' : '!'}</span>
              <div>
                <div className="iss-nm">{it.detector_name}</div>
                <div className="iss-id">{it.detector_id} {'\u00b7'} {it.priority} {'\u00b7'} {fmtMs(it.latency_ms)}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Filter controls */}
      <div className="rep-controls">
        <div className="grp">
          <button className={'chip' + (filter === 'all' ? ' on' : '')} onClick={() => setFilter('all')}>All <span className="ct">{results.length}</span></button>
          <button className={'chip' + (filter === 'pass' ? ' on' : '')} onClick={() => setFilter('pass')}>Pass <span className="ct">{report.passed || 0}</span></button>
          <button className={'chip' + (filter === 'fail' ? ' on' : '')} onClick={() => setFilter('fail')}>Fail <span className="ct">{report.failed || 0}</span></button>
          <button className={'chip' + (filter === 'skip' ? ' on' : '')} onClick={() => setFilter('skip')}>Skip <span className="ct">{report.skipped || 0}</span></button>
        </div>
        <div className="grp-sep" />
        <div className="grp">
          <button className={'chip' + (priFilter === 'all' ? ' on' : '')} onClick={() => setPriFilter('all')}>All stages</button>
          {STAGES.map(s => {
            const cnt = results.filter(d => d.priority === s).length;
            return cnt > 0 ? <button key={s} className={'chip' + (priFilter === s ? ' on' : '')} onClick={() => setPriFilter(s)}>{STAGE_LABELS[s]}</button> : null;
          })}
        </div>
        <div className="grp-sep" />
        <div className="search">
          <span className="ic">Search</span>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Filter detectors..." />
        </div>
      </div>

      {/* Results table */}
      <div className="check-list">
        <div className="h">
          <span></span>
          <span className="id">ID</span>
          <span>STAGE</span>
          <span>DETECTOR</span>
          <span style={{ textAlign: 'right' }}>LATENCY</span>
          <span style={{ textAlign: 'center' }}>VERDICT</span>
          <span></span>
        </div>
        {filtered.map((it, idx) => (
          <div key={it.detector_id} className={'row ' + it.verdict} onClick={() => setOpenIdx(idx)}>
            <span className="stat">{verdictSymbol(it.verdict)}</span>
            <span className="id">{it.detector_id}</span>
            <span className="cat">{STAGE_LABELS[it.priority] || it.priority}</span>
            <span className="nm">{it.detector_name}</span>
            <span className="lat">{fmtMs(it.latency_ms)}</span>
            <span className="state">{it.verdict}</span>
            <span className="chev">{'\u203a'}</span>
          </div>
        ))}
        {filtered.length === 0 && (
          <div style={{ padding: '40px 20px', textAlign: 'center', color: 'var(--ink-3)' }}>
            No detectors match the current filter.
          </div>
        )}
      </div>

      {/* Drawer */}
      <div className={'drawer-mask' + (opened ? ' on' : '')} onClick={() => setOpenIdx(null)} />
      <div className={'drawer' + (opened ? ' on' : '')}>
        {opened && (
          <>
            <div className="drawer-h">
              <div className="l">
                <span className="id-pill">{opened.detector_id}</span>
                <span className="cat-pill">{STAGE_NAMES[opened.priority] || opened.priority}</span>
              </div>
              <button className="close" onClick={() => setOpenIdx(null)}>{'\u2715'}</button>
            </div>
            <div className="drawer-body">
              <div className={'drawer-title ' + opened.verdict}>
                <div className="stat-big">{verdictSymbol(opened.verdict)}</div>
                <div>
                  <h2>{opened.detector_name}</h2>
                  <div className="desc">{opened.detector_id} {'\u00b7'} {opened.priority}</div>
                </div>
              </div>
              <div className="drawer-stats">
                <div className={'cell ' + opened.verdict}>
                  <div className="k">Verdict</div>
                  <div className="v">{opened.verdict}</div>
                </div>
                <div className="cell">
                  <div className="k">Latency</div>
                  <div className="v">{fmtMs(opened.latency_ms)}</div>
                </div>
                <div className="cell">
                  <div className="k">Confidence</div>
                  <div className="v">{opened.confidence != null ? (opened.confidence * 100).toFixed(0) + '%' : '\u2014'}</div>
                </div>
              </div>

              {opened.evidence && (
                <div className="drawer-section">
                  <div className="h">
                    <span>Evidence</span>
                    <button className="copy" onClick={() => navigator.clipboard.writeText(JSON.stringify(opened.evidence, null, 2))}>copy</button>
                  </div>
                  {opened.evidence.reason && (
                    <div className={'finding-card ' + opened.verdict}>
                      <div className="ic">{verdictSymbol(opened.verdict)}</div>
                      <div className="body">
                        <div className="k">{opened.verdict === 'pass' ? 'Detector satisfied' : opened.verdict === 'fail' ? 'Issue detected' : 'Finding'}</div>
                        <div className="v">{opened.evidence.reason}</div>
                      </div>
                    </div>
                  )}
                  <pre className="code-block" style={{ marginTop: 12 }}>{JSON.stringify(opened.evidence, null, 2)}</pre>
                </div>
              )}

              {opened.skipped_reason && (
                <div className="drawer-section">
                  <div className="h"><span>Skip reason</span></div>
                  <div className="finding-card skip">
                    <div className="ic">{'\u2014'}</div>
                    <div className="body">
                      <div className="k">Skipped</div>
                      <div className="v">{opened.skipped_reason}</div>
                    </div>
                  </div>
                </div>
              )}
            </div>
            <div className="drawer-foot">
              <button className="nav-btn" disabled={openIdx === 0} onClick={() => setOpenIdx(openIdx - 1)}>{'\u2190'} Prev</button>
              <span className="of">{openIdx + 1} of {filtered.length}</span>
              <button className="nav-btn" disabled={openIdx === filtered.length - 1} onClick={() => setOpenIdx(openIdx + 1)}>Next {'\u2192'}</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ===================== HISTORY SCREEN =====================
function HistoryScreen({ history, onOpen, onNew }) {
  const empty = !history || history.length === 0;

  return (
    <div className="page-pg">
      <div className="page-head">
        <div>
          <h1>Recent audits</h1>
          <div className="desc">Every security audit you have run. Click a row to view the full report.</div>
        </div>
        <div className="actions">
          <button className="btn-dark" onClick={onNew}>+ New audit</button>
        </div>
      </div>

      {empty && (
        <div className="empty-state">
          <div className="ic">?</div>
          <h3>No audits yet</h3>
          <p>Run your first security audit and results will appear here.</p>
          <button className="btn-dark" onClick={onNew}>Start an audit {'\u2192'}</button>
        </div>
      )}

      {!empty && (
        <div className="history-list">
          {history.map(h => {
            const pass = h.passed || 0;
            const fail = h.failed || 0;
            const skip = h.skipped || 0;
            const total = h.total_detectors || 85;
            const rate = total ? Math.round(pass / total * 100) : 0;
            const vrd = h.overall_verdict === 'pass' ? 'pass' : fail > 0 ? 'fail' : 'warn';
            const isRunning = h.status === 'running' || h.status === 'pending';
            const host = shortHost(h.router_endpoint);
            const time = h.created_at ? new Date(h.created_at).toLocaleDateString('en', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';

            // Build mini matrix
            const cells = [];
            for (let i = 0; i < pass; i++) cells.push('p');
            for (let i = 0; i < fail; i++) cells.push('f');
            for (let i = 0; i < Math.max(0, total - pass - fail - skip); i++) cells.push('w');
            for (let i = 0; i < skip; i++) cells.push('s');

            return (
              <div key={h.task_id} className="hist-card" onClick={() => onOpen(h.task_id)}>
                <div className={'score-pip ' + (isRunning ? '' : vrd)}>
                  <div className="n">{isRunning ? '...' : rate}</div>
                  <div className="l">{isRunning ? h.status : (h.tier_assignment || vrd)}</div>
                </div>
                <div className="info">
                  <div className="t1">{host} <span style={{ color: 'var(--ink-4)', fontWeight: 400 }}>{'\u00b7'}</span> {h.claimed_model || '?'}</div>
                  <div className="t2">
                    <span>{h.task_id?.slice(0, 8)}</span>
                    <span className="sep">{'\u00b7'}</span>
                    {!isRunning && <>
                      <span style={{ color: 'var(--pass)' }}>{pass} pass</span>
                      <span style={{ color: 'var(--fail)' }}>{fail} fail</span>
                    </>}
                    {isRunning && <span>{h.progress || '...'}</span>}
                  </div>
                </div>
                <div className="mini-mtx">
                  {cells.slice(0, 85).map((c, j) => <i key={j} className={c} />)}
                </div>
                <div className="ts">
                  <b>{time}</b>
                  {h.total_latency_ms && <div style={{ marginTop: 2 }}>{(h.total_latency_ms / 1000).toFixed(0)}s</div>}
                </div>
                <div className="chev">{'\u203a'}</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ===================== LEADERBOARD SCREEN =====================
function LeaderboardScreen() {
  const [tasks, setTasks] = useState([]);
  const [loading, setLoading] = useState(true);
  const [viewMode, setViewMode] = useState('rank'); // rank | domain
  const [search, setSearch] = useState('');

  useEffect(() => {
    loadData();
  }, []);

  const loadData = async () => {
    setLoading(true);
    try {
      const r = await fetch(API_BASE + '/api/v1/tests?limit=200');
      if (r.ok) {
        const data = await r.json();
        setTasks((data.items || data || []).filter(t => t.status === 'completed'));
      }
    } catch {}
    setLoading(false);
  };

  const filtered = useMemo(() => {
    let list = tasks.filter(t => t.passed != null);
    if (search) {
      const q = search.toLowerCase();
      list = list.filter(t =>
        (t.claimed_model || '').toLowerCase().includes(q) ||
        (t.router_endpoint || '').toLowerCase().includes(q)
      );
    }
    return list.sort((a, b) => {
      const ra = (a.total_detectors || 1) > 0 ? (a.passed || 0) / (a.total_detectors || 1) : 0;
      const rb = (b.total_detectors || 1) > 0 ? (b.passed || 0) / (b.total_detectors || 1) : 0;
      return rb - ra;
    });
  }, [tasks, search]);

  // Group by domain
  const domainGroups = useMemo(() => {
    if (viewMode !== 'domain') return null;
    const groups = {};
    filtered.forEach(t => {
      const domain = shortHost(t.router_endpoint) || 'unknown';
      if (!groups[domain]) groups[domain] = [];
      groups[domain].push(t);
    });
    return Object.entries(groups).sort((a, b) => b[1].length - a[1].length);
  }, [filtered, viewMode]);

  const passing = filtered.filter(t => t.overall_verdict === 'pass').length;
  const avgRate = filtered.length ? Math.round(filtered.reduce((s, t) => s + ((t.passed || 0) / (t.total_detectors || 1) * 100), 0) / filtered.length) : 0;

  if (loading) return <div className="loading-center"><div className="spinner" /><div>Loading leaderboard...</div></div>;

  const renderRow = (t, rank) => {
    const total = t.total_detectors || 1;
    const rate = Math.round((t.passed || 0) / total * 100);
    const vrd = t.overall_verdict === 'pass' ? 'pass' : (t.failed || 0) > 0 ? 'fail' : 'warn';
    return (
      <div key={t.task_id} className="lb-row" onClick={() => navigateTo('/task/' + t.task_id)}>
        <span className={'lb-rank' + (rank <= 3 ? ' r' + rank : '')}>{rank}</span>
        <div className="lb-prov">
          <div>
            <div className="nm">{t.claimed_model || '?'}</div>
            <div className="endpoint">{shortHost(t.router_endpoint)}</div>
          </div>
        </div>
        <div className="lb-score" style={{ textAlign: 'right' }}>
          {rate}<sup>%</sup>
        </div>
        <span className={'lb-tag ' + vrd}><span className="d" />{t.tier_assignment || vrd}</span>
        <div className="lb-tier">{(t.passed || 0)}p / {(t.failed || 0)}f</div>
      </div>
    );
  };

  return (
    <div className="page-pg">
      <div className="page-head">
        <div>
          <h1>Leaderboard</h1>
          <div className="desc">All completed audit results ranked by pass rate.</div>
        </div>
        <div className="actions">
          <button className="btn-ghost" onClick={loadData}>Refresh</button>
        </div>
      </div>

      <div className="lb-stats">
        <div className="tile">
          <div className="k">Total runs</div>
          <div className="v">{filtered.length}</div>
          <div className="d">completed audits</div>
        </div>
        <div className="tile">
          <div className="k">Avg pass rate</div>
          <div className="v">{avgRate}<sup>%</sup></div>
          <div className="d">across all runs</div>
        </div>
        <div className="tile">
          <div className="k">Passing the bar</div>
          <div className="v">{passing}<sup>/{filtered.length}</sup></div>
          <div className="d">zero fails</div>
        </div>
        <div className="tile">
          <div className="k">View mode</div>
          <div style={{ marginTop: 6, display: 'flex', gap: 6 }}>
            <button className={'chip' + (viewMode === 'rank' ? ' on' : '')} onClick={() => setViewMode('rank')} style={{ padding: '4px 10px', borderRadius: 100, fontSize: 12, fontWeight: 500, background: viewMode === 'rank' ? 'var(--ink)' : 'var(--bg-2)', color: viewMode === 'rank' ? 'oklch(1 0 0 / 0.96)' : 'var(--ink-2)', border: '1px solid var(--border)' }}>By Rank</button>
            <button className={'chip' + (viewMode === 'domain' ? ' on' : '')} onClick={() => setViewMode('domain')} style={{ padding: '4px 10px', borderRadius: 100, fontSize: 12, fontWeight: 500, background: viewMode === 'domain' ? 'var(--ink)' : 'var(--bg-2)', color: viewMode === 'domain' ? 'oklch(1 0 0 / 0.96)' : 'var(--ink-2)', border: '1px solid var(--border)' }}>By Domain</button>
          </div>
        </div>
      </div>

      <div style={{ marginBottom: 12 }}>
        <div className="rep-controls" style={{ marginBottom: 0 }}>
          <div className="search" style={{ flex: 1 }}>
            <span className="ic">Search</span>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Filter by model or endpoint..." />
          </div>
        </div>
      </div>

      {filtered.length === 0 && (
        <div className="empty-state">
          <div className="ic">?</div>
          <h3>No results yet</h3>
          <p>Complete some audits to see them on the leaderboard.</p>
        </div>
      )}

      {filtered.length > 0 && viewMode === 'rank' && (
        <div className="lb-table">
          <div className="h">
            <span>#</span>
            <span>MODEL / ENDPOINT</span>
            <span style={{ textAlign: 'right' }}>PASS %</span>
            <span>TIER</span>
            <span>RESULTS</span>
          </div>
          {filtered.map((t, i) => renderRow(t, i + 1))}
        </div>
      )}

      {filtered.length > 0 && viewMode === 'domain' && domainGroups && (
        <div className="lb-table">
          <div className="h">
            <span>#</span>
            <span>MODEL / ENDPOINT</span>
            <span style={{ textAlign: 'right' }}>PASS %</span>
            <span>TIER</span>
            <span>RESULTS</span>
          </div>
          {domainGroups.map(([domain, items]) => (
            <React.Fragment key={domain}>
              <div className="domain-group-header">
                <span>{domain}</span>
                <span>{items.length} run{items.length > 1 ? 's' : ''}</span>
              </div>
              {items.map((t, i) => renderRow(t, i + 1))}
            </React.Fragment>
          ))}
        </div>
      )}
    </div>
  );
}

// ===================== REFERENCE SCREEN =====================
function ReferenceScreen() {
  const [detectors, setDetectors] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('all');

  useEffect(() => {
    (async () => {
      try {
        const r = await fetch(API_BASE + '/api/v1/detectors');
        if (r.ok) setDetectors(await r.json());
      } catch {}
      setLoading(false);
    })();
  }, []);

  const counts = useMemo(() => {
    const c = { all: detectors.length };
    STAGES.forEach(s => c[s] = detectors.filter(d => d.priority === s).length);
    return c;
  }, [detectors]);

  const filtered = filter === 'all' ? detectors : detectors.filter(d => d.priority === filter);

  if (loading) return <div className="loading-center"><div className="spinner" /><div>Loading detectors...</div></div>;

  return (
    <div className="page-pg">
      <div className="page-head">
        <div>
          <h1>Detector Reference</h1>
          <div className="desc">{detectors.length} detectors across {STAGES.length} severity stages</div>
        </div>
      </div>

      <div className="ref-bar">
        <button className={'fbtn' + (filter === 'all' ? ' on' : '')} onClick={() => setFilter('all')}>All {counts.all}</button>
        {STAGES.map(s => counts[s] > 0 ? (
          <button key={s} className={'fbtn' + (filter === s ? ' on' : '')} onClick={() => setFilter(s)}>{STAGE_LABELS[s]} {counts[s]}</button>
        ) : null)}
      </div>

      <div className="ref-grid">
        {filtered.map(d => (
          <div key={d.detector_id} className="ref-card">
            <div className="rc-top">
              <span className="rc-id">{d.detector_id}</span>
              <span className={'rc-pri ' + d.priority}>{(d.priority || '').toUpperCase()}</span>
            </div>
            <div className="rc-name">{d.detector_name}</div>
            <div className="rc-desc">{d.description}</div>
            <div className="rc-foot">
              <span>Mode: {d.judge_mode || 'once'}</span>
              <span>Requests: {d.request_count || 1}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ===================== NAVIGATION HELPER =====================
let _navigateTo = null;
function navigateTo(path) {
  if (_navigateTo) _navigateTo(path);
}

// ===================== APP =====================
function App() {
  const [route, setRoute] = useState(() => parseRoute(window.location.pathname));
  const [phase, setPhase] = useState('idle'); // idle | running | report
  const [config, setConfig] = useState(null);
  const [taskId, setTaskId] = useState(null);
  const [report, setReport] = useState(null);
  const [detectors, setDetectors] = useState([]);
  const [taskHistory, setTaskHistory] = useState([]);

  function parseRoute(path) {
    if (path.startsWith('/task/')) return { page: 'task', id: path.slice(6) };
    if (path === '/leaderboard') return { page: 'leaderboard' };
    if (path === '/reference') return { page: 'reference' };
    if (path === '/history') return { page: 'history' };
    return { page: 'home' };
  }

  const navigate = useCallback((path, replace = false) => {
    const r = parseRoute(path);
    setRoute(r);
    if (replace) {
      window.history.replaceState({ path }, '', path);
    } else {
      window.history.pushState({ path }, '', path);
    }
  }, []);

  _navigateTo = navigate;

  useEffect(() => {
    const handler = (e) => {
      const path = window.location.pathname;
      setRoute(parseRoute(path));
    };
    window.addEventListener('popstate', handler);
    return () => window.removeEventListener('popstate', handler);
  }, []);

  // Load detectors for running screen
  useEffect(() => {
    (async () => {
      try {
        const r = await fetch(API_BASE + '/api/v1/detectors');
        if (r.ok) setDetectors(await r.json());
      } catch {}
    })();
  }, []);

  // Load history
  const loadHistory = useCallback(async () => {
    try {
      const r = await fetch(API_BASE + '/api/v1/tests?limit=50');
      if (r.ok) {
        const data = await r.json();
        setTaskHistory((data.items || data || []).slice(0, 50));
      }
    } catch {}
  }, []);

  useEffect(() => { loadHistory(); }, []);

  // Handle task route
  useEffect(() => {
    if (route.page === 'task' && route.id) {
      loadTask(route.id);
    }
  }, [route]);

  const loadTask = async (id) => {
    setPhase('report');
    setTaskId(id);
    setReport(null);
    try {
      const r = await fetch(API_BASE + '/api/v1/tests/' + id);
      if (!r.ok) {
        setReport({ error_code: r.status, error_msg: 'Task not found or expired.' });
        return;
      }
      const task = await r.json();
      if (task.status === 'completed' || task.status === 'failed') {
        // Try /report endpoint first, fall back to task.report
        try {
          const rr = await fetch(API_BASE + '/api/v1/tests/' + id + '/report');
          if (rr.ok) {
            setReport(await rr.json());
            return;
          }
        } catch {}
        // Use embedded report
        if (task.report) {
          setReport(task.report);
        } else {
          setReport({ error_code: 0, error_msg: 'Report not available.' });
        }
      } else if (task.status === 'running' || task.status === 'pending') {
        setPhase('running');
        setConfig({ endpoint: task.router_endpoint, models: [task.claimed_model] });
      }
    } catch (e) {
      setReport({ error_code: 0, error_msg: e.message });
    }
  };

  const startScan = async (cfg) => {
    const models = cfg.models || ['gpt-4o'];

    // Multi-model batch
    if (models.length > 1) {
      for (const m of models) {
        await createTask(cfg, m);
      }
      navigate('/history');
      loadHistory();
      return;
    }

    await createTask(cfg, models[0]);
  };

  const createTask = async (cfg, model) => {
    const body = {
      router_endpoint: cfg.endpoint,
      api_key: cfg.apiKey,
      claimed_model: model,
      claimed_provider: cfg.provider,
      capabilities: cfg.capabilities,
      scan_mode: cfg.scanMode,
      routing: cfg.routing,
      timeout: cfg.timeout,
      concurrency: cfg.concurrency,
    };
    if (cfg.authMethod) body.auth_method = cfg.authMethod;
    if (cfg.directEndpoint) { body.direct_endpoint = cfg.directEndpoint; body.direct_api_key = cfg.directApiKey; }
    if (cfg.secondApiKey) body.second_api_key = cfg.secondApiKey;

    try {
      const r = await fetch(API_BASE + '/api/v1/tests', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!r.ok) {
        const text = await r.text();
        console.error('Failed to create task:', text);
        return;
      }
      const task = await r.json();
      saveMyTaskId(task.task_id);
      setTaskId(task.task_id);
      setConfig(cfg);
      setPhase('running');
      setReport(null);
      navigate('/task/' + task.task_id, true);
    } catch (e) {
      console.error('Error creating task:', e);
    }
  };

  const onComplete = async (id) => {
    setPhase('report');
    try {
      // Try /report endpoint first
      const rr = await fetch(API_BASE + '/api/v1/tests/' + id + '/report');
      if (rr.ok) {
        setReport(await rr.json());
        loadHistory();
        return;
      }
    } catch {}
    // Fallback: get task directly
    try {
      const r = await fetch(API_BASE + '/api/v1/tests/' + id);
      if (r.ok) {
        const task = await r.json();
        setReport(task.report || task);
      }
    } catch {}
    loadHistory();
  };

  const reset = () => {
    setPhase('idle');
    setReport(null);
    setTaskId(null);
    navigate('/');
  };

  // Determine current tab
  let tab = route.page;
  if (route.page === 'home' || route.page === 'task') tab = 'home';

  // Determine what to show
  let content = null;
  if (tab === 'home') {
    if (route.page === 'task') {
      if (phase === 'running' && taskId) {
        content = <RunningScreen taskId={taskId} config={config} detectors={detectors} onCancel={reset} onComplete={onComplete} />;
      } else {
        content = <ReportScreen report={report} taskId={taskId} config={config} onReset={reset} />;
      }
    } else if (phase === 'running' && taskId) {
      content = <RunningScreen taskId={taskId} config={config} detectors={detectors} onCancel={reset} onComplete={onComplete} />;
    } else if (phase === 'report' && report) {
      content = <ReportScreen report={report} taskId={taskId} config={config} onReset={reset} />;
    } else {
      content = <SetupScreen onStart={startScan} />;
    }
  } else if (tab === 'history') {
    content = <HistoryScreen history={taskHistory} onOpen={(id) => { navigate('/task/' + id); loadTask(id); }} onNew={() => { reset(); navigate('/'); }} />;
  } else if (tab === 'leaderboard') {
    content = <LeaderboardScreen />;
  } else if (tab === 'reference') {
    content = <ReferenceScreen />;
  }

  return (
    <div className="app-shell">
      <nav className="app-nav">
        <div className="brand-mark" onClick={() => { reset(); navigate('/'); }}>
          <div className="glyph"><Logo size={16} /></div>
          <span>Router Auditor <span className="ver">v2.0</span></span>
        </div>
        <div className="nav-tabs">
          <button className={'nav-tab' + (tab === 'home' ? ' on' : '')} onClick={() => {
            if (phase === 'running' || phase === 'report') {
              // Stay on current task view
              navigate(taskId ? '/task/' + taskId : '/');
            } else {
              navigate('/');
            }
          }}>
            <span>Audit</span>
            {phase === 'running' && <span className="ct" style={{ background: 'var(--accent)' }}>live</span>}
          </button>
          <button className={'nav-tab' + (tab === 'history' ? ' on' : '')} onClick={() => { loadHistory(); navigate('/history'); }}>
            <span>History</span>
            {taskHistory.length > 0 && <span className="ct">{taskHistory.length}</span>}
          </button>
          <button className={'nav-tab' + (tab === 'leaderboard' ? ' on' : '')} onClick={() => navigate('/leaderboard')}>
            <span>Leaderboard</span>
          </button>
          <button className={'nav-tab' + (tab === 'reference' ? ' on' : '')} onClick={() => navigate('/reference')}>
            <span>Reference</span>
          </button>
        </div>
        <div className="nav-right">
          <span className="meta-pill"><span className="d" />ready</span>
          <a href="/docs" style={{ fontSize: 12, color: 'var(--ink-3)' }}>API Docs</a>
        </div>
      </nav>

      <div className="app-page">
        {content}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
